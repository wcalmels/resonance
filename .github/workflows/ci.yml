name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package
        run: pip install -e "packages/core[dev,phi47]"

      - name: Run unit tests
        run: pytest packages/core/tests/ -v --tb=short

      - name: Run offline context benchmark
        run: python benchmarks/benchmark_context.py

      - name: Run offline pipeline benchmark
        run: python benchmarks/benchmark_pipeline.py --runs 5

      - name: Upload benchmark artifacts
        uses: actions/upload-artifact@v4
        with:
          name: benchmarks-py${{ matrix.python-version }}
          path: |
            benchmarks/results/context_benchmark.json
            benchmarks/results/pipeline_benchmark.json
