[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "resonance"
version = "0.2.2"
description = "Specialized AI bots with minimal token context"
readme = "README.md"
requires-python = ">=3.9"
license = { text = "MIT" }
dependencies = [
    "anthropic>=0.18.0",
    "python-dotenv>=1.0.0",
]

[project.optional-dependencies]
dev = ["pytest>=7.0"]
phi47 = ["phi47-superpowers>=0.1.1"]
full = ["phi47-superpowers>=0.1.1"]

[project.scripts]
resonance = "resonance.cli:main"

[tool.setuptools.packages.find]
where = ["."]
include = ["resonance*"]

[tool.pytest.ini_options]
testpaths = ["tests"]
